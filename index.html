<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="logoBox">
          <img src="./images/sidebarLogo.png" alt="distorted windows icon" class="dashBoardLogo" />
          <h3>Dashboard</h3>
        </div>
        <div class="middle">
          <div class="sidebarBox">
            <img src="./images/home.svg" alt="home icon" class="logo" />
            <p class="sidebarBtnText">Home</p>
          </div>
          <div class="sidebarBox">
            <img src="./images/card-account-details-outline.svg" alt="profile card icon" class="logo" />
            <p class="sidebarBtnText">Profile</p>
          </div>
          <div class="sidebarBox">
            <img src="./images/message.svg" alt="messaging icon" class="logo" />
            <p class="sidebarBtnText">Messages</p>
          </div>
          <div class="sidebarBox">
            <img src="./images/clock-time-nine-outline.svg" alt="clock icon" class="logo" />
            <p class="sidebarBtnText">History</p>
          </div>
          <div class="sidebarBox">
            <img src="./images/note-multiple-outline.svg" alt="stacked notes icon" class="logo" />
            <p class="sidebarBtnText">Tasks</p>
          </div>
          <div class="sidebarBox">
            <img src="/images/account-group.svg" alt="multiple people icon" class="logo" />
            <p class="sidebarBtnText">Communities</p>
          </div>
        </div>
        <div class="last">
            <div class="sidebarBox">
                <img src="./images/cog.svg" alt="gear icon" class="logo" />
                <p class="sidebarBtnText">Settings</p>
            </div>
            <div class="sidebarBox">
                <img src="./images/help-box-outline.svg" alt="help box icon" class="logo" />
                <p class="sidebarBtnText">Support</p>
            </div>
            <div class="sidebarBox">
                <img src="./images/shield-check.svg" alt="shield check icon" class="logo" />
                <p class="sidebarBtnText">Privacy</p>
            </div>
        </div>
      </div>
      <div class="header">
      </div>
      <div class="main"></div>
    </div>
  </body>
</html>
