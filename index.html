<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="logoBox">
          <img
            src="./images/sidebarLogo.png"
            alt="distorted windows icon"
            class="dashBoardLogo"
          />
          <h3>Dashboard</h3>
        </div>
        <div class="middle">
          <div class="sidebarBox">
            <img src="./images/home.svg" alt="home icon" class="logo" />
            <p class="sidebarBtnText">Home</p>
          </div>
          <div class="sidebarBox">
            <img
              src="./images/card-account-details-outline.svg"
              alt="profile card icon"
              class="logo"
            />
            <p class="sidebarBtnText">Profile</p>
          </div>
          <div class="sidebarBox">
            <img src="./images/message.svg" alt="messaging icon" class="logo" />
            <p class="sidebarBtnText">Messages</p>
          </div>
          <div class="sidebarBox">
            <img
              src="./images/clock-time-nine-outline.svg"
              alt="clock icon"
              class="logo"
            />
            <p class="sidebarBtnText">History</p>
          </div>
          <div class="sidebarBox">
            <img
              src="./images/note-multiple-outline.svg"
              alt="stacked notes icon"
              class="logo"
            />
            <p class="sidebarBtnText">Tasks</p>
          </div>
          <div class="sidebarBox">
            <img
              src="/images/account-group.svg"
              alt="multiple people icon"
              class="logo"
            />
            <p class="sidebarBtnText">Communities</p>
          </div>
        </div>
        <div class="last">
          <div class="sidebarBox">
            <img src="./images/cog.svg" alt="gear icon" class="logo" />
            <p class="sidebarBtnText">Settings</p>
          </div>
          <div class="sidebarBox">
            <img
              src="./images/help-box-outline.svg"
              alt="help box icon"
              class="logo"
            />
            <p class="sidebarBtnText">Support</p>
          </div>
          <div class="sidebarBox">
            <img
              src="./images/shield-check.svg"
              alt="shield check icon"
              class="logo"
            />
            <p class="sidebarBtnText">Privacy</p>
          </div>
        </div>
      </div>
      <div class="header">
        <div class="top">
          <div class="left">
            <img
              src="./images/magnify.svg"
              alt="search icon"
              class="searchLogo logo"
            />
            <input type="text" name="searchBar" id="searchBar" />
          </div>
          <div class="right">
            <img
              src="./images/bell-ring.svg"
              alt="ringing bell icon"
              class="bellIcon logo"
            />
            <img src="./images/liftarn_Cat_silhouette.svg" alt="profile picture" class="pfp logo" />
            <h4 class="name">Morgan Oakley</h4>
          </div>
        </div>
        <div class="bottom">
          <div class="left">
            <div class="profileInfo"></div>
            <div class="left">
              <img src="./images/liftarn_Cat_silhouette.svg" alt="profile photo" class="pfp logo"/>
            </div>
            <div class="right">
              <p class="hi">Hi there,</p>
              <h2 class="UserAndName">Morgan Oakley(@morgan)</h2>
            </div>
          </div>
          <div class="right">
            <button class="headerBtn">New</button>
            <button class="headerBtn">Upload</button>
            <button class="headerBtn">Share</button>
          </div>
        </div>
      </div>
      <div class="main">
        
      </div>
    </div>
  </body>
</html>
